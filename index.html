<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>cotiza ₩¥</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #f5f0fa;
  --bg2:    #ede8f8;
  --bg3:    #fdf8ff;
  --lav:    #c0a8e8;
  --lav2:   #a080d0;
  --lav3:   #7050a0;
  --rose:   #e880a8;
  --rose2:  #f0c0d8;
  --rose3:  #fce8f2;
  --jpn:    #80b8e8;
  --jpn2:   #e8f4fc;
  --jpn3:   #3070a0;
  --merc:   #e8a040;
  --merc2:  #fdf2e0;
  --merc3:  #a06010;
  --text:   #3a2060;
  --muted:  #9070b0;
  --muted2: #c8b0e0;
  --border: #ddd0f0;
  --white:  #ffffff;
  --danger: #e06080;
  --success:#70b090;
  --warn:   #e0a060;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

/* DIV FEATURE */
.div-card { background: var(--white); border-radius: 16px; border: 1px solid var(--border); padding: 12px 14px; margin-top: 10px; }
.div-card-title { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
.div-tabs { display: grid; gap: 4px; background: var(--bg2); border-radius: 12px; padding: 3px; margin-bottom: .75rem; }
.dtab { padding: 7px; border: none; border-radius: 9px; background: none; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .2s; text-align: center; }
.dtab.active { background: var(--white); color: var(--lav3); }
.n-row { display: flex; align-items: center; gap: 10px; }
.n-row label { font-size: 12px; color: var(--muted); flex: 1; }
.n-row input { width: 64px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; text-align: center; }
.n-row input:focus { border-color: var(--lav2); }
.miembros-grid { display: flex; flex-direction: column; gap: 5px; margin-bottom: 6px; }
.m-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--bg); border-radius: 10px; }
.m-emoji { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
.m-nombre { flex: 1; font-size: 13px; font-weight: 500; }
.m-tier { font-size: 10px; color: var(--muted); margin-right: 4px; }
.m-pct-wrap { display: flex; align-items: center; gap: 3px; }
.m-pct-wrap input { width: 42px; background: var(--white); border: 1.5px solid var(--border); border-radius: 6px; padding: 3px 5px; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text); outline: none; text-align: center; }
.m-pct-wrap input:focus { border-color: var(--lav2); }
.m-pct-wrap span { font-size: 11px; color: var(--muted); }
.pct-sum { font-size: 11px; text-align: right; margin-bottom: 8px; }
.pct-ok { color: var(--success); }
.pct-err { color: var(--danger); }
.div-result-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12px; }
.div-result-table th { font-size: 10px; color: var(--muted); font-weight: 500; text-align: right; padding: 3px 6px; border-bottom: 1px solid var(--border); }
.div-result-table th:first-child { text-align: left; }
.div-result-table td { padding: 5px 6px; text-align: right; border-bottom: 1px solid var(--border); }
.div-result-table td:first-child { text-align: left; font-weight: 500; }
.div-result-table tr:last-child td { border-bottom: none; }
.div-result-table .col-wise { color: var(--lav2); font-weight: 600; }

/* HEADER */
header { background: var(--white); border-bottom: 1px solid var(--border); padding: .9rem 1.25rem .7rem; position: sticky; top: 0; z-index: 20; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .6rem; }
.app-title { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--lav3); }
.app-title em { color: var(--rose); font-style: italic; }
.rate-badge { display: flex; align-items: center; gap: 5px; background: var(--bg2); border-radius: 999px; padding: 4px 10px; font-size: 11px; color: var(--muted); }
.rdot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
.rdot.loading { background: var(--warn); animation: pulse 1s infinite; }
.rdot.error { background: var(--danger); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.switcher { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; margin-bottom: .65rem; background: var(--bg2); border-radius: 12px; padding: 3px; }
.sw-btn { padding: 7px 4px; border: none; border-radius: 9px; background: none; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .2s; text-align: center; }
.sw-btn.active-kr { background: var(--white); color: var(--lav3); }
.sw-btn.active-jp { background: var(--white); color: var(--jpn3); }
.sw-btn.active-mc { background: var(--white); color: var(--merc3); }

.rates-row { display: flex; gap: 6px; flex-wrap: wrap; }
.rate-pill { flex: 1; min-width: 80px; background: var(--bg2); border-radius: 9px; padding: 5px 9px; display: flex; flex-direction: column; gap: 1px; }
.rate-pill label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
.rate-pill input { background: none; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--text); width: 100%; }

/* MAIN */
main { padding: .85rem 1rem 4rem; max-width: 900px; margin: 0 auto; }

/* INPUT ROW */
.add-bar { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: .85rem; margin-bottom: .85rem; display: flex; gap: 6px; align-items: flex-end; flex-wrap: wrap; }
.add-field { display: flex; flex-direction: column; gap: 3px; }
.add-field label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.add-field input { background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 11px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color .2s; }
.add-field input:focus { border-color: var(--lav2); background: var(--white); }
.add-field input::placeholder { color: var(--muted2); }
.inp-nombre { width: 180px; }
.inp-precio { width: 120px; }
.btn-add { padding: 9px 18px; background: var(--lav2); color: var(--white); border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .2s; white-space: nowrap; align-self: flex-end; }
.btn-add:hover { opacity: .85; }
.btn-add.jp { background: var(--jpn); }
.btn-add.mc { background: var(--merc); }

/* TABLA WRAPPER con scroll horizontal en móvil */
.table-wrap { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: .85rem; }
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 580px; }
thead th { background: var(--bg2); color: var(--muted); font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; padding: 7px 10px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
thead th.th-price { text-align: right; }
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg3); }
tbody td { padding: 6px 10px; vertical-align: middle; }

.td-nombre { font-weight: 500; color: var(--text); min-width: 100px; }
.td-precio { color: var(--muted); white-space: nowrap; }
.td-price { text-align: right; font-weight: 500; color: var(--text); white-space: nowrap; }
.td-price.rose { color: var(--rose); }
.td-price.lav  { color: var(--lav2); }

/* ENVÍO TOGGLE + INPUT en celda */
.envio-cell { display: flex; align-items: center; gap: 5px; }
.tog { width: 28px; height: 16px; border-radius: 999px; border: none; cursor: pointer; position: relative; flex-shrink: 0; transition: background .2s; background: var(--border); }
.tog.on { background: var(--rose); }
.tog::after { content: ''; position: absolute; width: 12px; height: 12px; background: var(--white); border-radius: 50%; top: 2px; left: 2px; transition: left .2s; }
.tog.on::after { left: 14px; }
.envio-input { width: 60px; font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--text); background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 3px 6px; outline: none; transition: all .2s; }
.envio-input:focus { border-color: var(--rose); background: var(--white); }
.envio-input:disabled { opacity: 0; pointer-events: none; width: 0; padding: 0; margin: 0; border: none; }

/* COMISION TOGGLE */
.com-tog { width: 28px; height: 16px; border-radius: 999px; border: none; cursor: pointer; position: relative; flex-shrink: 0; transition: background .2s; background: var(--border); }
.com-tog.on { background: var(--lav2); }
.com-tog::after { content: ''; position: absolute; width: 12px; height: 12px; background: var(--white); border-radius: 50%; top: 2px; left: 2px; transition: left .2s; }
.com-tog.on::after { left: 14px; }

/* BTN DEL */
/* EDICION INLINE */
.td-edit { background: none; border: none; border-bottom: 1.5px solid transparent; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color .2s; padding: 1px 2px; }
.td-edit:focus { border-color: var(--lav2); }
.td-edit-nombre { font-weight: 500; font-size: 12px; min-width: 80px; max-width: 140px; }
.td-edit-precio { font-size: 12px; color: var(--muted); width: 75px; }
.btn-del { background: none; border: none; color: var(--muted2); font-size: 16px; cursor: pointer; padding: 0 2px; transition: color .15s; line-height: 1; }
.btn-del:hover { color: var(--danger); }

/* SECTION LABEL EN TABLA */
.tbl-section { background: var(--rose3); }
.tbl-section td { padding: 4px 10px; font-size: 9px; font-weight: 500; color: var(--rose); text-transform: uppercase; letter-spacing: .07em; }
.tbl-section.lav { background: var(--bg2); }
.tbl-section.lav td { color: var(--lav2); }

/* TOTALES */
.totals-wrap { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: .85rem; }
.totals-header { padding: 8px 12px; background: var(--bg2); border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; display: flex; justify-content: space-between; align-items: center; }
.totals-grid { display: grid; grid-template-columns: repeat(4, 1fr); }
.tot-cell { padding: 10px 12px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 3px; }
.tot-cell:last-child { border-right: none; }
.tot-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.tot-val { font-size: 18px; font-weight: 500; color: var(--text); }
.tot-cell.hl-rose { background: var(--rose3); } .tot-cell.hl-rose .tot-val { color: var(--rose); }
.tot-cell.hl-lav  { background: var(--bg2);   } .tot-cell.hl-lav .tot-val  { color: var(--lav2); }
.tot-cell.hl-jpn  { background: var(--jpn2);  } .tot-cell.hl-jpn .tot-val  { color: var(--jpn3); }
.tot-cell.hl-merc { background: var(--merc2); } .tot-cell.hl-merc .tot-val { color: var(--merc3); }

/* EMPTY */
.empty { text-align: center; padding: 2.5rem 1rem; color: var(--muted2); font-size: 13px; }

/* ACCIONES */
.actions { display: flex; gap: 8px; flex-wrap: wrap; padding: .85rem; border-top: 1px solid var(--border); align-items: center; }
.btn-action { padding: 8px 14px; border-radius: 10px; border: 1.5px solid var(--border); background: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .2s; }
.btn-action:hover { border-color: var(--lav2); color: var(--lav2); background: var(--bg2); }
.btn-action.danger { color: var(--muted); }
.btn-action.danger:hover { border-color: var(--danger); color: var(--danger); background: var(--rose3); }
.copy-ok { font-size: 11px; color: var(--success); }

@media (max-width: 600px) {
  .inp-nombre { width: 140px; }
  .inp-precio { width: 100px; }
  .totals-grid { grid-template-columns: repeat(2,1fr); }
  .tot-cell:nth-child(2) { border-right: none; }
  .tot-cell:nth-child(3) { border-top: 1px solid var(--border); }
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="app-title">cotiza<em>₩¥</em></div>
    <div class="rate-badge"><span class="rdot loading" id="rdot"></span><span id="rstatus">cargando...</span></div>
  </div>
  <div class="switcher">
    <button class="sw-btn active-kr" id="sw-kr" onclick="setMode('kr')">🇰🇷 Corea ₩</button>
    <button class="sw-btn" id="sw-jp" onclick="setMode('jp')">🇯🇵 Japón ¥</button>
    <button class="sw-btn" id="sw-mc" onclick="setMode('mc')">🛍️ Mercari</button>
  </div>
  <div class="rates-row" id="rates-kr">
    <div class="rate-pill"><label>1 ₩ = ? $ MXN</label><input type="number" id="rate-kr" value="0.01100" step="0.00001" min="0.00001" inputmode="decimal"></div>
    <div class="rate-pill"><label>1 USD = ? $ MXN</label><input type="number" id="usd-mxn" value="17.50" step="0.01" min="1" inputmode="decimal"></div>
    <div class="rate-pill"><label>Spread tarjeta %</label><input type="number" id="spread-kr" value="3" step="0.5" min="0" max="20" inputmode="decimal"></div>
    <div class="rate-pill"><label>Wise + banco %</label><input type="number" id="wise-kr" value="15" step="0.5" min="0" max="30" inputmode="decimal"></div>
  </div>
  <div class="rates-row" id="rates-jp" style="display:none">
    <div class="rate-pill"><label>1 ¥ = ? $ MXN</label><input type="number" id="rate-jp" value="0.09500" step="0.00001" min="0.00001" inputmode="decimal"></div>
    <div class="rate-pill"><label>1 USD = ? $ MXN</label><input type="number" id="usd-mxn-jp" value="17.50" step="0.01" min="1" inputmode="decimal"></div>
    <div class="rate-pill"><label>Spread tarjeta %</label><input type="number" id="spread-jp" value="3" step="0.5" min="0" max="20" inputmode="decimal"></div>
    <div class="rate-pill"><label>Wise + banco %</label><input type="number" id="wise-jp" value="15" step="0.5" min="0" max="30" inputmode="decimal"></div>
  </div>
  <div class="rates-row" id="rates-mc" style="display:none">
    <div class="rate-pill" style="background:var(--merc2)"><label>Tipo de cambio ¥</label><input type="number" id="rate-mc" value="0.125" step="0.001" min="0.001" inputmode="decimal"></div>
    <div class="rate-pill" style="background:var(--merc2)"><label>Mi comisión MXN</label><input type="number" id="comision-mc" value="10" step="1" min="0" inputmode="numeric"></div>
  </div>
</header>

<main>
  <!-- ADD BAR -->
  <div class="add-bar" id="add-bar">
    <div class="add-field">
      <label>nombre</label>
      <input type="text" id="inp-nombre" class="inp-nombre" placeholder="Ej: Tshirt" autocomplete="off">
    </div>
    <div class="add-field">
      <label id="inp-precio-label">precio en ₩</label>
      <input type="number" id="inp-precio" class="inp-precio" placeholder="59000" step="500" min="0" inputmode="numeric">
    </div>
    <button class="btn-add" id="btn-add" onclick="agregar()">+ agregar</button>
  </div>

  <!-- TABLA -->
  <div class="table-wrap" id="table-wrap" style="display:none">
    <div class="table-scroll">
      <table id="tabla">
        <thead id="thead-kr">
          <tr>
            <th>producto</th>
            <th>₩</th>
            <th>envío ₩</th>
            <th>wise</th>
            <th class="th-price">×0.015</th>
            <th class="th-price">cambio día</th>
            <th class="th-price">nu/banamex</th>
            <th class="th-price">wise +%</th>
            <th></th>
          </tr>
        </thead>
        <thead id="thead-jp" style="display:none">
          <tr>
            <th>producto</th>
            <th>¥</th>
            <th>envío ¥</th>
            <th>wise</th>
            <th class="th-price">×0.13</th>
            <th class="th-price">cambio día</th>
            <th class="th-price">nu/banamex</th>
            <th class="th-price">wise +%</th>
            <th></th>
          </tr>
        </thead>
        <thead id="thead-mc" style="display:none">
          <tr>
            <th>producto</th>
            <th>¥ mercari</th>
            <th colspan="2"></th>
            <th class="th-price" colspan="4">precio final MXN</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="actions">
      <button class="btn-action" onclick="copiarTexto()">📋 copiar resumen</button>
      <button class="btn-action" onclick="copiarTabla()">📊 copiar tabla</button>
      <button class="btn-action" onclick="exportar()">💾 guardar lista</button>
      <button class="btn-action" onclick="document.getElementById('importar-input').click()">📂 cargar lista</button>
      <input type="file" id="importar-input" accept=".json" style="display:none" onchange="importar(this)">
      <button class="btn-action danger" onclick="limpiar()">✕ limpiar</button>
      <span class="copy-ok" id="copy-ok"></span>
    </div>
  </div>

  <!-- TOTALES -->
  <div class="totals-wrap" id="totals-wrap" style="display:none">
    <div class="totals-header">
      <span>totales</span>
      <span id="tot-count" style="color:var(--muted2)"></span>
    </div>
    <div class="totals-grid" id="totals-grid"></div>
  </div>

  <!-- DIVIDIR TOTAL -->
  <div class="div-card" id="div-card" style="display:none">
    <div class="div-card-title">dividir total entre</div>
    <div class="div-tabs" style="grid-template-columns:1fr 1fr 1fr">
      <button class="dtab active" id="dtab-no" onclick="setDivMode('no')">— sin dividir</button>
      <button class="dtab" id="dtab-igual" onclick="setDivMode('igual')">÷ igual entre N</button>
      <button class="dtab" id="dtab-pct" onclick="setDivMode('pct')">💜 por miembro</button>
    </div>
    <div id="dpanel-igual" style="display:none">
      <div class="n-row">
        <label>¿Entre cuántas personas?</label>
        <input type="number" id="d-n-personas" value="7" min="1" max="50" step="1" inputmode="numeric" oninput="renderDivResult()">
      </div>
    </div>
    <div id="dpanel-pct" style="display:none">
      <div class="miembros-grid" id="div-miembros-grid"></div>
      <div class="pct-sum pct-ok" id="div-pct-sum">Total: 100%</div>
    </div>
    <div id="div-result-wrap" style="display:none">
      <table class="div-result-table" id="div-result-table"></table>
    </div>
  </div>
</main>

<script>
let productos = [];
let modo = 'kr';
let rateKR = 0.01100;
let rateJP = 0.09500;
let divMode = 'no';
let _lastSums = null;

const MIEMBROS = [
  {nombre:'Namjoon', emoji:'🐨', tier:'4th', pct:13},
  {nombre:'Jin',     emoji:'🐹', tier:'4th', pct:13},
  {nombre:'Yoongi',  emoji:'🐱', tier:'3rd', pct:14},
  {nombre:'Hoseok',  emoji:'🌞', tier:'3rd', pct:14},
  {nombre:'Jimin',   emoji:'🐥', tier:'2nd', pct:15},
  {nombre:'Taehyung',emoji:'🐯', tier:'1st', pct:16},
  {nombre:'Jungkook',emoji:'🐰', tier:'1st', pct:16},
];

async function fetchRates() {
  try {
    const res = await fetch('https://open.er-api.com/v6/latest/MXN');
    const data = await res.json();
    if (data.rates) {
      if (data.rates.KRW) { rateKR = 1/data.rates.KRW; document.getElementById('rate-kr').value = rateKR.toFixed(5); }
      if (data.rates.JPY) { rateJP = 1/data.rates.JPY; document.getElementById('rate-jp').value = rateJP.toFixed(5); }
      if (data.rates.USD) {
        const usdMxn = (1/data.rates.USD).toFixed(2);
        document.getElementById('usd-mxn').value = usdMxn;
        document.getElementById('usd-mxn-jp').value = usdMxn;
      }
      document.getElementById('rdot').className = 'rdot';
      document.getElementById('rstatus').textContent = 'cambio actualizado';
    } else throw 0;
  } catch {
    document.getElementById('rdot').className = 'rdot error';
    document.getElementById('rstatus').textContent = 'edita el cambio';
  }
}

['rate-kr','rate-jp','rate-mc','usd-mxn','usd-mxn-jp','spread-kr','spread-jp','wise-kr','wise-jp','comision-mc'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', render);
});

function g(id) { return parseFloat(document.getElementById(id).value) || 0; }
function getRateKR()  { return g('rate-kr') || rateKR; }
function getRateJP()  { return g('rate-jp') || rateJP; }
function getSpreadKR(){ return g('spread-kr')/100; }
function getSpreadJP(){ return g('spread-jp')/100; }
function getWiseKR()  { return 1 + g('wise-kr')/100; }
function getWiseJP()  { return 1 + g('wise-jp')/100; }
function getRateMC()  { return g('rate-mc') || 0.125; }
function getComMC()   { return g('comision-mc') || 10; }
function fmt(n)       { return '$'+Math.round(n).toLocaleString('es-MX'); }

function calcKR(precio, envio) {
  const r = getRateKR(), sp = getSpreadKR(), wi = getWiseKR();
  const total = precio + envio;
  return { formula: total*0.015, dia: total*r, card: total*r*(1+sp), wise: total*r*wi };
}
function calcJP(precio, envio) {
  const r = getRateJP(), sp = getSpreadJP(), wi = getWiseJP();
  const total = precio + envio;
  return { formula: total*0.13, dia: total*r, card: total*r*(1+sp), wise: total*r*wi };
}
function calcMC(precio) {
  return { result: ((precio+350)*1.04)*getRateMC()+getComMC() };
}

function setMode(m) {
  modo = m;
  ['kr','jp','mc'].forEach(x => {
    document.getElementById('rates-'+x).style.display = x===m?'flex':'none';
    document.getElementById('sw-'+x).className = 'sw-btn'+(x===m?' active-'+x:'');
    const th = document.getElementById('thead-'+x);
    if (th) th.style.display = x===m?'':'none';
  });
  document.getElementById('inp-precio-label').textContent = m==='kr'?'precio en ₩':'precio en ¥';
  document.getElementById('btn-add').className = 'btn-add'+(m==='jp'?' jp':m==='mc'?' mc':'');
  render();
}

function agregar() {
  const nombre = document.getElementById('inp-nombre').value.trim() || 'Producto';
  const precio = parseInt(document.getElementById('inp-precio').value);
  if (!precio || precio <= 0) { document.getElementById('inp-precio').focus(); return; }
  const envioDefault = modo==='kr' ? (precio<50000?3000:0) : modo==='jp' ? 800 : 0;
  productos.push({ tipo: modo, nombre, precio, envio: envioDefault, envioOn: envioDefault>0, wiseOn: true });
  document.getElementById('inp-nombre').value = '';
  document.getElementById('inp-precio').value = '';
  document.getElementById('inp-nombre').focus();
  render();
}

document.getElementById('inp-precio').addEventListener('keydown', e => { if(e.key==='Enter') agregar(); });
document.getElementById('inp-nombre').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('inp-precio').focus(); });

function toggleEnvio(i) {
  productos[i].envioOn = !productos[i].envioOn;
  render();
}
function setEnvio(i, val) {
  productos[i].envio = parseFloat(val) || 0;
  render();
}
function setNombre(i, val) {
  if (!val.trim()) return;
  productos[i].nombre = val.trim();
}
function setPrecio(i, val) {
  const v = parseInt(val);
  if (!v || v <= 0) { eliminar(i); return; }
  productos[i].precio = v;
  if (productos[i].tipo === 'kr') { productos[i].envio = v < 50000 ? 3000 : 0; productos[i].envioOn = v < 50000; }
  render();
}
function toggleWise(i) {
  productos[i].wiseOn = !productos[i].wiseOn;
  render();
}
function eliminar(i) {
  productos.splice(i, 1);
  render();
}
function limpiar() {
  if(confirm('¿Limpiar todos los productos?')) { productos=[]; render(); }
}

function render() {
  const visible = productos.filter(p => p.tipo===modo);
  const tbody = document.getElementById('tbody');
  const wrap = document.getElementById('table-wrap');
  const totWrap = document.getElementById('totals-wrap');

  if (visible.length===0) {
    wrap.style.display = 'none';
    totWrap.style.display = 'none';
    document.getElementById('div-card').style.display = 'none';
    _lastSums = null;
    return;
  }
  wrap.style.display = 'block';
  totWrap.style.display = 'block';

  tbody.innerHTML = '';
  let sums = { formula:0, dia:0, card:0, wise:0, mc:0, won:0, yen:0 };

  visible.forEach(p => {
    const gi = productos.indexOf(p);
    const tr = document.createElement('tr');

    if (p.tipo==='kr') {
      const envioAmt = p.envioOn ? p.envio : 0;
      const c = calcKR(p.precio, envioAmt);
      sums.formula += c.formula; sums.dia += c.dia; sums.card += c.card;
      if(p.wiseOn) sums.wise += c.wise;
      sums.won += p.precio + (p.envioOn ? p.envio : 0);
      tr.innerHTML = `
        <td><input class="td-edit td-edit-nombre" value="${p.nombre}" onblur="setNombre(${gi},this.value)" onkeydown="if(event.key==='Enter')this.blur()"></td>
        <td><input class="td-edit td-edit-precio" type="number" value="${p.precio}" step="500" min="0" onblur="setPrecio(${gi},this.value)" onkeydown="if(event.key==='Enter')this.blur()"></td>
        <td>
          <div class="envio-cell">
            <button class="tog${p.envioOn?' on':''}" onclick="toggleEnvio(${gi})"></button>
            <input class="envio-input" type="number" value="${p.envio}" step="500" min="0"
              ${p.envioOn?'':'disabled'}
              onchange="setEnvio(${gi},this.value)" oninput="setEnvio(${gi},this.value)">
          </div>
        </td>
        <td><button class="com-tog${p.wiseOn?' on':''}" onclick="toggleWise(${gi})"></button></td>
        <td class="td-price">${fmt(c.formula)}</td>
        <td class="td-price">${fmt(c.dia)}</td>
        <td class="td-price">${fmt(c.card)}</td>
        <td class="td-price lav">${p.wiseOn?fmt(c.wise):'—'}</td>
        <td><button class="btn-del" onclick="eliminar(${gi})">×</button></td>`;
    } else if (p.tipo==='jp') {
      const envioAmt = p.envioOn ? p.envio : 0;
      const c = calcJP(p.precio, envioAmt);
      sums.formula += c.formula; sums.dia += c.dia; sums.card += c.card;
      if(p.wiseOn) sums.wise += c.wise;
      sums.yen += p.precio + (p.envioOn ? p.envio : 0);
      tr.innerHTML = `
        <td><input class="td-edit td-edit-nombre" value="${p.nombre}" onblur="setNombre(${gi},this.value)" onkeydown="if(event.key==='Enter')this.blur()"></td>
        <td><input class="td-edit td-edit-precio" type="number" value="${p.precio}" step="100" min="0" onblur="setPrecio(${gi},this.value)" onkeydown="if(event.key==='Enter')this.blur()"></td>
        <td>
          <div class="envio-cell">
            <button class="tog${p.envioOn?' on':''}" onclick="toggleEnvio(${gi})"></button>
            <input class="envio-input" type="number" value="${p.envio}" step="100" min="0"
              ${p.envioOn?'':'disabled'}
              onchange="setEnvio(${gi},this.value)" oninput="setEnvio(${gi},this.value)">
          </div>
        </td>
        <td><button class="com-tog${p.wiseOn?' on':''}" onclick="toggleWise(${gi})"></button></td>
        <td class="td-price">${fmt(c.formula)}</td>
        <td class="td-price">${fmt(c.dia)}</td>
        <td class="td-price">${fmt(c.card)}</td>
        <td class="td-price lav">${p.wiseOn?fmt(c.wise):'—'}</td>
        <td><button class="btn-del" onclick="eliminar(${gi})">×</button></td>`;
    } else {
      const c = calcMC(p.precio);
      sums.mc += c.result;
      tr.innerHTML = `
        <td><input class="td-edit td-edit-nombre" value="${p.nombre}" onblur="setNombre(${gi},this.value)" onkeydown="if(event.key==='Enter')this.blur()"></td>
        <td><input class="td-edit td-edit-precio" type="number" value="${p.precio}" step="100" min="0" onblur="setPrecio(${gi},this.value)" onkeydown="if(event.key==='Enter')this.blur()"></td>
        <td colspan="2" style="font-size:10px;color:var(--muted)">(¥${p.precio}+350)×1.04×${getRateMC()}+$${getComMC()}</td>
        <td class="td-price rose" colspan="4">${fmt(c.result)}</td>
        <td><button class="btn-del" onclick="eliminar(${gi})">×</button></td>`;
    }
    tbody.appendChild(tr);
  });

  // TOTALES
  const tg = document.getElementById('totals-grid');
  document.getElementById('tot-count').textContent = visible.length + ' producto' + (visible.length!==1?'s':'');
  if (modo==='mc') {
    tg.style.gridTemplateColumns = '1fr';
    tg.innerHTML = `<div class="tot-cell hl-merc"><span class="tot-lbl">total mercari</span><span class="tot-val">${fmt(sums.mc)}</span></div>`;
    _lastSums = null;
    document.getElementById('div-card').style.display = 'none';
  } else {
    tg.style.gridTemplateColumns = 'repeat(5,1fr)';
    const lbl = modo==='kr'?'×0.015':'×0.13';
    const totalMoneda = modo==='kr' ? sums.won : sums.yen;
    const simMoneda = modo==='kr' ? '₩' : '¥';
    tg.innerHTML = `
      <div class="tot-cell hl-rose"><span class="tot-lbl">total ${simMoneda}</span><span class="tot-val" style="font-size:16px">${simMoneda}${totalMoneda.toLocaleString('es-MX')}</span></div>
      <div class="tot-cell"><span class="tot-lbl">${lbl}</span><span class="tot-val">${fmt(sums.formula)}</span></div>
      <div class="tot-cell ${modo==='jp'?'hl-jpn':''}"><span class="tot-lbl">cambio día</span><span class="tot-val">${fmt(sums.dia)}</span></div>
      <div class="tot-cell"><span class="tot-lbl">nu / banamex</span><span class="tot-val">${fmt(sums.card)}</span></div>
      <div class="tot-cell hl-lav"><span class="tot-lbl">wise +${modo==='kr'?g('wise-kr'):g('wise-jp')}%</span><span class="tot-val">${fmt(sums.wise)}</span></div>`;
    _lastSums = sums;
    document.getElementById('div-card').style.display = 'block';
    renderDivResult();
  }
}

function ok(msg) { const el=document.getElementById('copy-ok'); el.textContent=msg; setTimeout(()=>el.textContent='',2500); }

function exportar() {
  const datos = {
    version: 1,
    fecha: new Date().toLocaleDateString('es-MX'),
    config: {
      rateKr: document.getElementById('rate-kr').value,
      rateJp: document.getElementById('rate-jp').value,
      usdMxn: document.getElementById('usd-mxn').value,
      spreadKr: document.getElementById('spread-kr').value,
      spreadJp: document.getElementById('spread-jp').value,
      wiseKr: document.getElementById('wise-kr').value,
      wiseJp: document.getElementById('wise-jp').value,
      rateMc: document.getElementById('rate-mc').value,
      comisionMc: document.getElementById('comision-mc').value,
    },
    productos
  };
  const blob = new Blob([JSON.stringify(datos, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cotizacion-' + new Date().toLocaleDateString('es-MX').replace(/\//g,'-') + '.json';
  a.click();
  ok('✓ lista descargada');
}

function importar(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const datos = JSON.parse(e.target.result);
      if (datos.productos) {
        productos = datos.productos;
        if (datos.config) {
          const c = datos.config;
          if (c.rateKr) document.getElementById('rate-kr').value = c.rateKr;
          if (c.rateJp) document.getElementById('rate-jp').value = c.rateJp;
          if (c.usdMxn) { document.getElementById('usd-mxn').value = c.usdMxn; document.getElementById('usd-mxn-jp').value = c.usdMxn; }
          if (c.spreadKr) document.getElementById('spread-kr').value = c.spreadKr;
          if (c.spreadJp) document.getElementById('spread-jp').value = c.spreadJp;
          if (c.wiseKr) document.getElementById('wise-kr').value = c.wiseKr;
          if (c.wiseJp) document.getElementById('wise-jp').value = c.wiseJp;
          if (c.rateMc) document.getElementById('rate-mc').value = c.rateMc;
          if (c.comisionMc) document.getElementById('comision-mc').value = c.comisionMc;
        }
        render();
        ok('✓ lista cargada · ' + (datos.fecha || ''));
      }
    } catch { ok('✗ archivo inválido'); }
  };
  reader.readAsText(file);
  input.value = '';
}

function copiarTexto() {
  const visible = productos.filter(p=>p.tipo===modo);
  if(!visible.length) return;
  let txt = modo==='kr'?'🇰🇷 COTIZACIÓN WON → MXN\n':modo==='jp'?'🇯🇵 COTIZACIÓN YEN → MXN\n':'🛍️ MERCARI → MXN\n';
  txt += '─'.repeat(36)+'\n\n';
  visible.forEach(p => {
    if(p.tipo==='mc') {
      const c=calcMC(p.precio);
      txt += `▸ ${p.nombre}  ¥${p.precio.toLocaleString()}\n  Final  ${fmt(c.result)}\n\n`;
    } else {
      const envioAmt = p.envioOn?p.envio:0;
      const c = p.tipo==='kr'?calcKR(p.precio,envioAmt):calcJP(p.precio,envioAmt);
      const sym = p.tipo==='kr'?'₩':'¥';
      txt += `▸ ${p.nombre}  ${sym}${p.precio.toLocaleString()}${envioAmt?' (+'+sym+envioAmt.toLocaleString()+' envío)':''}\n`;
      txt += `  ${p.tipo==='kr'?'×0.015':'×0.13 '}  ${fmt(c.formula)}\n`;
      txt += `  Cambio día  ${fmt(c.dia)}\n`;
      txt += `  Nu/Banamex  ${fmt(c.card)}\n`;
      txt += `  Wise        ${p.wiseOn?fmt(c.wise):'—'}\n\n`;
    }
  });
  navigator.clipboard.writeText(txt).then(()=>ok('✓ resumen copiado'));
}

function copiarTabla() {
  const visible = productos.filter(p=>p.tipo===modo);
  if(!visible.length) return;
  let txt = '';
  if(modo==='mc') {
    txt = 'Producto\t¥ Mercari\tPrecio MXN\n';
    visible.forEach(p=>{ const c=calcMC(p.precio); txt+=`${p.nombre}\t${p.precio}\t${fmt(c.result)}\n`; });
  } else {
    const lbl=modo==='kr'?'×0.015':'×0.13';
    txt=`Producto\tPrecio\tEnvío\t${lbl}\tCambio día\tNu/Banamex\tWise\n`;
    visible.forEach(p=>{
      const envioAmt=p.envioOn?p.envio:0;
      const c=p.tipo==='kr'?calcKR(p.precio,envioAmt):calcJP(p.precio,envioAmt);
      const sym=p.tipo==='kr'?'₩':'¥';
      txt+=`${p.nombre}\t${sym}${p.precio}\t${envioAmt?sym+envioAmt:'—'}\t${fmt(c.formula)}\t${fmt(c.dia)}\t${fmt(c.card)}\t${p.wiseOn?fmt(c.wise):'—'}\n`;
    });
  }
  navigator.clipboard.writeText(txt).then(()=>ok('✓ tabla copiada'));
}

function importar(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.productos) productos = data.productos;
      if (data.rates) {
        const r = data.rates;
        if (r.kr) document.getElementById('rate-kr').value = r.kr;
        if (r.jp) document.getElementById('rate-jp').value = r.jp;
        if (r.usdMxn) { document.getElementById('usd-mxn').value = r.usdMxn; document.getElementById('usd-mxn-jp').value = r.usdMxn; }
        if (r.spreadKr) document.getElementById('spread-kr').value = r.spreadKr;
        if (r.spreadJp) document.getElementById('spread-jp').value = r.spreadJp;
        if (r.wiseKr) document.getElementById('wise-kr').value = r.wiseKr;
        if (r.wiseJp) document.getElementById('wise-jp').value = r.wiseJp;
        if (r.rateMc) document.getElementById('rate-mc').value = r.rateMc;
        if (r.comisionMc) document.getElementById('comision-mc').value = r.comisionMc;
      }
      render();
      ok('✓ lista cargada — ' + productos.length + ' productos');
    } catch { ok('✗ archivo inválido'); }

// ── DIV FEATURE ──
function setDivMode(m) {
  divMode = m;
  document.getElementById('dtab-no').className = 'dtab' + (m==='no'?' active':'');
  document.getElementById('dtab-igual').className = 'dtab' + (m==='igual'?' active':'');
  document.getElementById('dtab-pct').className = 'dtab' + (m==='pct'?' active':'');
  document.getElementById('dpanel-igual').style.display = m==='igual'?'block':'none';
  document.getElementById('dpanel-pct').style.display = m==='pct'?'block':'none';
  if(m==='pct') renderDivMiembros();
  renderDivResult();
}

function renderDivMiembros() {
  const el = document.getElementById('div-miembros-grid');
  el.innerHTML = '';
  MIEMBROS.forEach((m,i) => {
    const row = document.createElement('div');
    row.className = 'm-row';
    row.innerHTML = `<span class="m-emoji">${m.emoji}</span><span class="m-nombre">${m.nombre}</span><span class="m-tier">${m.tier}</span><div class="m-pct-wrap"><input type="number" id="dpct-${i}" value="${m.pct}" min="0" max="100" step="1" inputmode="numeric" oninput="updateDivPctSum();renderDivResult()"><span>%</span></div>`;
    el.appendChild(row);
  });
  updateDivPctSum();
}

function updateDivPctSum() {
  const total = MIEMBROS.reduce((s,_,i) => {
    const el = document.getElementById('dpct-'+i);
    return s + (el ? parseFloat(el.value)||0 : MIEMBROS[i].pct);
  }, 0);
  const el = document.getElementById('div-pct-sum');
  el.textContent = 'Total: ' + Math.round(total) + '%';
  el.className = 'pct-sum ' + (Math.abs(total-100)<0.5 ? 'pct-ok' : 'pct-err');
}

function getDivPcts() {
  return MIEMBROS.map((_,i) => {
    const el = document.getElementById('dpct-'+i);
    return el ? parseFloat(el.value)||0 : MIEMBROS[i].pct;
  });
}

function renderDivResult() {
  const wrap = document.getElementById('div-result-wrap');
  const tbl = document.getElementById('div-result-table');
  if(!_lastSums || divMode==='no') { wrap.style.display='none'; return; }
  const sums = _lastSums;
  if(modo==='mc') { wrap.style.display='none'; return; }

  wrap.style.display = 'block';
  const lbl = modo==='kr' ? '×0.015' : '×0.13';
  // Build header
  let html = `<thead><tr><th>persona</th><th>${lbl}</th><th>día</th><th>nu/ban</th><th class="col-wise">wise</th></tr></thead><tbody>`;

  if(divMode==='igual') {
    const n = parseInt(document.getElementById('d-n-personas').value)||7;
    for(let j=1;j<=n;j++){
      html += `<tr>
        <td>Persona ${j}</td>
        <td>${fmt(sums.formula/n)}</td>
        <td>${fmt(sums.dia/n)}</td>
        <td>${fmt(sums.card/n)}</td>
        <td class="col-wise">${sums.wise>0?fmt(sums.wise/n):'—'}</td>
      </tr>`;
    }
  } else if(divMode==='pct') {
    const pcts = getDivPcts();
    const sumPct = pcts.reduce((a,b)=>a+b,0)||100;
    MIEMBROS.forEach((m,i) => {
      const pct = pcts[i];
      html += `<tr>
        <td>${m.emoji} ${m.nombre} <span style="font-size:10px;color:var(--muted)">${pct}%</span></td>
        <td>${fmt(sums.formula*(pct/sumPct))}</td>
        <td>${fmt(sums.dia*(pct/sumPct))}</td>
        <td>${fmt(sums.card*(pct/sumPct))}</td>
        <td class="col-wise">${sums.wise>0?fmt(sums.wise*(pct/sumPct)):'—'}</td>
      </tr>`;
    });
  }
  html += '</tbody>';
  tbl.innerHTML = html;
}

fetchRates();
render();
</script>
